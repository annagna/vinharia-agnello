<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>
     <!-- pagina inicial de cadastro -->

        <label for="sobrenome">Sobrenome:</label>

        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="exemplo@email.com">

        <button id="meuBotao">Cadastrar</button>
    </div>
<!-- pagina com fundo para prompt  apos clicar em cadastrar-->
    <div id="paginaPrompt">
        <h1>Vinheria Agnello</h1>
        <p>Sistema básico para cadastro de vinhos artesanais.</p>
        <h2>Preparando o cadastro do vinho🍷</h2>
        <p></p>
    </div>

    <!-- ultima pagina -->
    <div id="pagina2">
        <h2>Obrigada</h2>
        <p>Veja as informacoes do seu vinho no console</p>
         <div class="vinho-animacao">
        <!-- GIF de Vinho -->
        <img src="src/assets/vinhos.gif" alt="vinhos">
    </div>
        
        <div id="botoes">

<!-- colocar imagrns e animacoes -->


        </div>
